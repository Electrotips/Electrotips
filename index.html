<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ElectroTips PDF Library</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      font-size: 18px;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: white;
      color: #333;
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📚 مكتبة ElectroTips</h2>
    <p>اختر الملف الذي تريد تحميله 👇</p>

    <div class="cards">

      <div class="card">
        <h3>📘 Beginner Guide</h3>
        <p>تعلم أساسيات الإلكترونيات</p>
        <a href="pdf1.html" class="btn">تحميل</a>
      </div>

      <div class="card">
        <h3>⚡ Advanced Projects</h3>
        <p>مشاريع متقدمة</p>
        <a href="pdf2.html" class="btn">تحميل</a>
      </div>

      <div class="card">
        <h3>🛠 Tools Guide</h3>
        <p>أفضل أدوات الإلكترونيات</p>
        <a href="pdf3.html" class="btn">تحميل</a>
      </div>

    </div>
  </div>

</body>
</html>
