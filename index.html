<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>ElectroTips PDF Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .main-container {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .content {
      max-width: 600px;
      width: 100%;
    }

    h2, p {
      text-align: center;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      color: #333;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    .card img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 25px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div class="content">
      <h2>📚 مكتبة ElectroTips</h2>
      <p>اختر الملف الذي تريد تحميله 👇</p>

      <div class="cards">

        <div class="card">
          <img src="images/pdf1.jpg" alt="PDF 1 Cover">
          <h3>📘 Beginner Guide</h3>
          <p>تعلم أساسيات الإلكترونيات</p>
          <a href="pdf1.html" class="btn">تحميل</a>
        </div>

        <div class="card">
          <img src="images/pdf2.jpg" alt="PDF 2 Cover">
          <h3>⚡ Advanced Projects</h3>
          <p>مشاريع متقدمة</p>
          <a href="pdf2.html" class="btn">تحميل</a>
        </div>

        <div class="card">
          <img src="images/pdf3.jpg" alt="PDF 3 Cover">
          <h3>🛠 Tools Guide</h3>
          <p>أفضل أدوات الإلكترونيات</p>
          <a href="pdf3.html" class="btn">تحميل</a>
        </div>

      </div>
    </div>
  </div>

  <script>(function(s){s.dataset.zone='10801343',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

</body>
</html>
