<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل دليل المبتدئين - ElectroTips</title>
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #4CAF50;
            --text-dark: #333;
            --bg-light: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            margin: 40px 0;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header-box {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-box h1 {
            color: var(--primary);
            font-size: 28px;
            margin: 0;
        }

        .preview-box {
            background: #fafafa;
            border: 1px dashed #ccc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .file-info {
            display: flex;
            justify-content: space-around;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .btn-download {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .ad-space {
            margin: 30px 0;
            padding: 15px;
            background: #fff8e1;
            border: 1px solid #ffe082;
            color: #856404;
            font-size: 13px;
            border-radius: 8px;
        }

        .footer-links {
            margin-top: 20px;
        }

        .footer-links a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h1>📥 مركز التحميل: دليل المبتدئين</h1>
            <p>ElectroTips Technical Library</p>
        </div>

        <div class="ad-space">
            إعلان: سيتم فتح الرابط في نافذة جديدة
            </div>

        <div class="preview-box">
            <h3>📘 IDM Electrical Diagram.pdf</h3>
            <p>وصف: مخططات كهربائية شاملة للمبتدئين والفنيين.</p>
        </div>

        <div class="file-info">
            <span>الصيغة: PDF</span>
            <span>الحجم: 2.4 MB</span>
            <span>اللغة: العربية/English</span>
        </div>

        <a href="IDM Electrical Diagram.pdf" download class="btn-download">بدء التحميل الآمن</a>

        <div class="ad-space" style="margin-top:40px;">
            مساحة إعلانية
        </div>

        <div class="footer-links">
            <a href="index.html">⬅ العودة إلى المكتبة الرئيسية</a>
        </div>
    </div>

    <script>(function(s){s.dataset.zone='10801343',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    
    <script>(function(s){s.dataset.zone='10802237',s.src='https://izcle.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    </body>
</html>
